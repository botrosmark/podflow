<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Podflow</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-50 flex items-center justify-center">
  <div class="w-full max-w-sm mx-auto px-6">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold">Podflow</h1>
      <p class="text-gray-500 text-sm mt-1">Intelligence Dashboard</p>
    </div>

    {% if msg %}
    <div class="bg-red-50 text-red-700 text-sm p-3 rounded-lg mb-4">{{ msg }}</div>
    {% endif %}

    <form action="/login" method="post" class="bg-white rounded-xl shadow-sm border p-6">
      <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
      <input type="email" name="email" required autofocus
             placeholder="you@example.com"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      <button type="submit"
              class="w-full mt-4 bg-gray-900 text-white rounded-lg px-4 py-2.5 text-sm font-medium hover:bg-gray-800 transition">
        Sign in
      </button>
    </form>
  </div>
</body>
</html>
